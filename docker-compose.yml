services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    container_name: blinvpn_bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      - webhook

  webhook:
    build:
      context: .
      dockerfile: Dockerfile.webhook
    container_name: blinvpn_webhook
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEBHOOK_PORT:-5000}:5000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: blinvpn_api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"

  miniapp:
    build:
      context: .
      dockerfile: Dockerfile.miniapp
    container_name: blinvpn_miniapp
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MINIAPP_PORT:-9741}:3000"
    env_file:
      - .env
    depends_on:
      - api

  panel:
    build:
      context: .
      dockerfile: Dockerfile.panel
    container_name: blinvpn_panel
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PANEL_PORT:-9742}:3000"
    env_file:
      - .env
    depends_on:
      - api

volumes:
  data:

